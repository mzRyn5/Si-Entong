<main class="min-h-screen flex flex-col bg-cover bg-center relative" style="background-image: url('assets/login_hero.jpg');">
  <!-- Overlay to darken the background slightly so text remains readable -->
  <div class="absolute inset-0 bg-slate-950/45 backdrop-blur-[2px] z-0"></div>
  
  <!-- Language Toggle Header -->
  @if (false) {
    <header class="flex justify-end p-6 relative z-10">
      <button
        type="button"
        (click)="toggleLanguage()"
        class="flex items-center gap-2 px-4 py-2 bg-white/20 border border-white/20 rounded-lg text-white text-sm font-medium hover:bg-white/30 hover:border-white/40 transition-all backdrop-blur-md"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="2" y1="12" x2="22" y2="12" />
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
        </svg>
        <span>{{ languageService.currentLang() === 'id' ? 'English' : 'Bahasa Indonesia' }}</span>
      </button>
    </header>
  }

  <!-- Login Card Centered -->
  <div class="flex-1 flex items-center justify-center p-6 relative z-10">
    <div class="w-full max-w-md bg-white/10 border border-white/20 rounded-3xl p-8 md:p-10 shadow-2xl backdrop-blur-xl flex flex-col">
      <!-- Brand -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-white/10 border border-white/20 text-white rounded-2xl mb-4 shadow-lg backdrop-blur-md">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <path d="M16 10a4 4 0 0 1-8 0" />
          </svg>
        </div>
        <h2 class="text-2xl font-bold text-white mb-1">{{ 'Masuk' | translate }}</h2>
        <p class="text-white/70 text-sm">{{ 'Silakan login menggunakan akun toko Anda' | translate }}</p>
      </div>

      <!-- Form -->
      <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)" novalidate class="space-y-5">
        <!-- Username Field -->
        <div>
          <label for="username" class="block text-xs font-semibold text-white/80 uppercase tracking-wide mb-2">{{ 'Username' | translate }}</label>
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-white/60" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <input
              id="username"
              type="text"
              class="w-full pl-10 pr-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:border-white/60 focus:ring-3 focus:ring-white/10 transition-all font-medium"
              name="username"
              [(ngModel)]="username"
              required
              placeholder="Username"
              #uInput="ngModel"
              [class.border-danger]="loginForm.submitted && uInput.invalid"
            />
          </div>
          <p *ngIf="loginForm.submitted && uInput.invalid" class="mt-1.5 text-xs text-red-200 font-medium">{{ 'Username wajib diisi.' | translate }}</p>
        </div>

        <!-- Password Field -->
        <div>
          <label for="password" class="block text-xs font-semibold text-white/80 uppercase tracking-wide mb-2">{{ 'Password' | translate }}</label>
          <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-white/60" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input
              id="password"
              [type]="showPassword() ? 'text' : 'password'"
              class="w-full pl-10 pr-12 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-white/40 focus:outline-none focus:border-white/60 focus:ring-3 focus:ring-white/10 transition-all font-medium"
              name="password"
              [(ngModel)]="password"
              required
              placeholder="Password"
              #pInput="ngModel"
              [class.border-danger]="loginForm.submitted && pInput.invalid"
            />
            <button
              type="button"
              (click)="togglePasswordVisibility()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-white/60 hover:text-white transition-colors"
              aria-label="Toggle password visibility"
            >
              <svg *ngIf="!showPassword()" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg *ngIf="showPassword()" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            </button>
          </div>
          <p *ngIf="loginForm.submitted && pInput.invalid" class="mt-1.5 text-xs text-red-200 font-medium">{{ 'Password wajib diisi.' | translate }}</p>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="loading()"
          class="w-full py-3.5 px-6 bg-gradient-to-r from-primary-600 to-primary-700 hover:from-primary-500 hover:to-primary-600 text-white font-bold rounded-xl shadow-lg shadow-primary-900/20 hover:shadow-xl transition-all flex items-center justify-center gap-2 border border-white/10"
        >
          <svg *ngIf="loading()" class="animate-spin w-5 h-5 text-white" viewBox="0 0 24 24" fill="none">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
          </svg>
          <span>{{ loading() ? ('Memproses...' | translate) : ('Masuk' | translate) }}</span>
        </button>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer class="text-center py-4 text-xs text-white/50 relative z-10">
    © Copyright by mzryan 2026
  </footer>
</main>
