<!-- Backdrop -->
<div
  class="fixed inset-0 z-50 bg-black/40 backdrop-blur-sm transition-opacity"
  (click)="onBackdropClick()"
></div>

<!-- Drawer Panel -->
<div
  class="fixed inset-y-0 right-0 z-50 bg-white shadow-2xl flex flex-col w-full transition-transform duration-300 ease-in-out"
  [class.translate-x-0]="isOpen"
  [class.translate-x-full]="!isOpen"
  [class.w-full]="isMobileDrawer"
  [class.w-[400px]]="!isMobileDrawer"
  [class.max-w-md]="!isMobileDrawer"
>
  role="dialog"
  aria-modal="true"
>
  <!-- Header -->
  <header class="flex items-center justify-between px-6 py-4 border-b border-border bg-white shrink-0">
    <h2 class="text-lg font-bold text-primary-900">{{ title }}</h2>
    <button
      type="button"
      (click)="close()"
      class="w-8 h-8 flex items-center justify-center rounded-lg text-text-muted hover:text-text hover:bg-surface-soft transition-colors"
      aria-label="Close"
    >
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </header>

  <!-- Body -->
  <div class="flex-1 overflow-y-auto p-6">
    <ng-content></ng-content>
  </div>

  <!-- Footer -->
  @if (showFooter) {
    <footer class="flex items-center justify-end gap-3 px-6 py-4 border-t border-border bg-surface-soft shrink-0">
      <ng-content select="[drawer-footer]"></ng-content>
    </footer>
  }
</div>
